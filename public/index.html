<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Clock - 正確な時計</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .left-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 50%, #0a0a2e 100%);
      padding: 20px;
      position: relative;
      min-width: 0;
    }

    .right-pane {
      flex: 1;
      border-left: 2px solid #333;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f0;
      position: relative;
    }

    .right-pane .pane-title {
      font-size: 1.1em;
      color: #336;
      margin-bottom: 8px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .right-pane .pane-subtitle {
      font-size: 0.8em;
      color: #666;
      margin-bottom: 18px;
    }

    .analog-clock-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 18px;
    }

    .analog-clock-container canvas {
      width: 100%;
      height: 100%;
    }

    .right-digital {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 2.5em;
      color: #223;
      margin-bottom: 4px;
    }

    .right-date {
      font-size: 1.1em;
      color: #445;
      margin-bottom: 15px;
    }

    .right-ms {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 1.4em;
      color: #667;
      margin-bottom: 18px;
    }

    .nict-link {
      font-size: 0.8em;
      color: #888;
      position: absolute;
      bottom: 15px;
      text-align: center;
    }

    .nict-link a {
      color: #4466aa;
      text-decoration: none;
    }

    .nict-link a:hover {
      text-decoration: underline;
    }

    .clock-title {
      font-size: 1.4em;
      color: #88aaff;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    .date-display {
      font-size: 1.3em;
      color: #aaccff;
      margin-bottom: 15px;
      letter-spacing: 0.05em;
    }

    .time-display {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 5em;
      color: #00ff88;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5), 0 0 40px rgba(0, 255, 136, 0.2);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .time-colon {
      transition: opacity 0.15s;
    }

    .time-colon.hidden {
      opacity: 0;
    }

    .ms-display {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 2.5em;
      color: #00cc66;
      text-shadow: 0 0 15px rgba(0, 204, 102, 0.4);
      margin-bottom: 25px;
    }

    .sync-info {
      font-size: 0.85em;
      color: #667788;
      text-align: center;
      line-height: 1.8;
    }

    .sync-info .label {
      color: #556677;
    }

    .sync-info .value {
      color: #88aacc;
    }

    .time-compare {
      width: 90%;
      max-width: 440px;
      margin-top: 20px;
      border-top: 1px solid #2a2a4a;
      padding-top: 12px;
    }

    .time-compare-title {
      font-size: 0.75em;
      color: #556677;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    .time-compare table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8em;
    }

    .time-compare th {
      color: #556677;
      font-weight: normal;
      text-align: left;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .time-compare td {
      font-family: 'Consolas', 'Courier New', monospace;
      color: #88aacc;
      text-align: right;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .time-compare .diff {
      font-size: 0.9em;
      color: #667;
    }

    .offset-positive { color: #ffaa44; }
    .offset-negative { color: #44aaff; }
    .offset-zero { color: #44ff88; }

    /* === Flip Clock (パタパタ時計) === */
    .flip-clock-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 5px;
    }

    .flip-clock-wrapper.active {
      display: flex;
    }

    .flip-clock-wrapper.active ~ .time-display,
    .flip-clock-wrapper.active ~ .ms-display {
      display: none;
    }

    .flip-clock-body {
      background: linear-gradient(135deg, #3ec9a7 0%, #2db890 50%, #28a882 100%);
      border-radius: 14px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow:
        0 6px 20px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -2px 0 rgba(0,0,0,0.15);
      position: relative;
    }

    .flip-clock-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 100%);
      border-radius: 14px 14px 0 0;
      pointer-events: none;
    }

    .flip-group {
      display: flex;
      gap: 4px;
    }

    .flip-card {
      position: relative;
      width: 62px;
      height: 90px;
      perspective: 300px;
    }

    .flip-card .top,
    .flip-card .bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 50%;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip-card .top {
      top: 0;
      border-radius: 6px 6px 0 0;
      border-bottom: 1px solid #000;
      align-items: flex-end;
    }

    .flip-card .bottom {
      bottom: 0;
      border-radius: 0 0 6px 6px;
      border-top: 1px solid #333;
      align-items: flex-start;
    }

    .flip-card .top .digit,
    .flip-card .bottom .digit {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 72px;
      font-weight: bold;
      color: #c8e84c;
      text-shadow: 0 0 8px rgba(200,232,76,0.4);
      line-height: 90px;
      position: absolute;
    }

    .flip-card .top .digit {
      top: 0;
    }

    .flip-card .bottom .digit {
      bottom: 0;
    }

    /* Center hinge line */
    .flip-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(0,0,0,0.7);
      z-index: 5;
      transform: translateY(-50%);
    }

    /* Side rivets */
    .flip-card::before {
      content: '';
      position: absolute;
      top: 50%;
      left: -2px;
      width: 4px;
      height: 4px;
      background: #555;
      border-radius: 50%;
      z-index: 6;
      transform: translateY(-50%);
      box-shadow: calc(62px) 0 0 #555;
    }

    /* Flip animation elements */
    .flip-card .flip-top,
    .flip-card .flip-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 50%;
      overflow: hidden;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip-card .flip-top {
      top: 0;
      background: #1a1a1a;
      border-radius: 6px 6px 0 0;
      transform-origin: bottom center;
      transform: rotateX(0deg);
      backface-visibility: hidden;
      align-items: flex-end;
    }

    .flip-card .flip-top .digit {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 72px;
      font-weight: bold;
      color: #c8e84c;
      text-shadow: 0 0 8px rgba(200,232,76,0.4);
      line-height: 90px;
      position: absolute;
      top: 0;
    }

    .flip-card .flip-bottom {
      bottom: 0;
      background: #1a1a1a;
      border-radius: 0 0 6px 6px;
      transform-origin: top center;
      transform: rotateX(90deg);
      backface-visibility: hidden;
      align-items: flex-start;
    }

    .flip-card .flip-bottom .digit {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 72px;
      font-weight: bold;
      color: #c8e84c;
      text-shadow: 0 0 8px rgba(200,232,76,0.4);
      line-height: 90px;
      position: absolute;
      bottom: 0;
    }

    .flip-card.flipping .flip-top {
      animation: flipDown1 0.3s ease-in forwards;
    }

    .flip-card.flipping .flip-bottom {
      animation: flipDown2 0.3s 0.3s ease-out forwards;
    }

    @keyframes flipDown1 {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flipDown2 {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .flip-separator {
      font-size: 48px;
      font-weight: bold;
      color: #1a1a1a;
      line-height: 90px;
      padding: 0 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .flip-ampm {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      color: #c8e84c;
      background: #1a1a1a;
      border-radius: 4px;
      padding: 4px 6px;
      margin-right: 6px;
      letter-spacing: 0.05em;
      text-shadow: 0 0 6px rgba(200,232,76,0.3);
    }

    .flip-card.small {
      width: 42px;
      height: 62px;
    }

    .flip-card.small .top .digit,
    .flip-card.small .bottom .digit,
    .flip-card.small .flip-top .digit,
    .flip-card.small .flip-bottom .digit {
      font-size: 50px;
      line-height: 62px;
    }

    .flip-card.small::before {
      box-shadow: 42px 0 0 #555;
    }

    .flip-separator-small {
      font-size: 36px;
      font-weight: bold;
      color: #1a1a1a;
      line-height: 62px;
      padding: 0 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .signal-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #333;
      transition: background 0.1s;
    }

    .signal-indicator.beep-low {
      background: #ffaa00;
      box-shadow: 0 0 10px #ffaa00, 0 0 20px rgba(255, 170, 0, 0.5);
    }

    .signal-indicator.beep-high {
      background: #ff3333;
      box-shadow: 0 0 10px #ff3333, 0 0 20px rgba(255, 51, 51, 0.5);
    }

    .countdown-bar {
      width: 80%;
      max-width: 400px;
      height: 6px;
      background: #1a1a3e;
      border-radius: 3px;
      margin-bottom: 25px;
      overflow: hidden;
    }

    .countdown-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffaa00, #ff3333);
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .countdown-label {
      font-size: 0.9em;
      color: #888;
      margin-bottom: 8px;
      height: 1.2em;
    }

    .pane-label {
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 0.75em;
      color: #445566;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .toggle-group {
      position: absolute;
      top: 16px;
      right: 50px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .sound-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75em;
      color: #667788;
    }

    .sound-toggle label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sound-toggle input {
      display: none;
    }

    .toggle-slider {
      width: 36px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .sound-toggle input:checked + .toggle-slider {
      background: #1a5a3a;
    }

    .sound-toggle input:checked + .toggle-slider::after {
      transform: translateX(16px);
      background: #00ff88;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      body {
        height: auto;
        overflow: auto;
      }

      .container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .right-pane {
        order: -1;
        border-left: none;
        border-bottom: 2px solid #333;
        padding: 20px 10px;
      }

      .left-pane {
        padding: 20px 10px;
      }

      .analog-clock-container {
        width: 260px;
        height: 260px;
        margin-bottom: 12px;
      }

      .right-digital {
        font-size: 1.8em;
      }

      .right-ms {
        font-size: 1.1em;
        margin-bottom: 10px;
      }

      .right-date {
        font-size: 0.95em;
        margin-bottom: 10px;
      }

      .nict-link {
        position: static;
        margin-top: 8px;
      }

      .clock-title {
        font-size: 1.1em;
      }

      .date-display {
        font-size: 1em;
      }

      .time-display {
        font-size: 2.8em;
      }

      .ms-display {
        font-size: 1.6em;
        margin-bottom: 15px;
      }

      .countdown-bar {
        width: 90%;
        margin-bottom: 15px;
      }

      .time-compare {
        max-width: 100%;
        margin-top: 15px;
      }

      .time-compare table {
        font-size: 0.75em;
      }

      .signal-indicator {
        top: 12px;
        right: 12px;
      }

      .pane-label {
        top: 8px;
        left: 10px;
        font-size: 0.65em;
      }

      .toggle-group {
        position: static;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .sound-toggle {
        font-size: 0.8em;
      }

      .flip-clock-body {
        padding: 12px 14px;
        gap: 4px;
      }

      .flip-card {
        width: 44px;
        height: 64px;
      }

      .flip-card .top .digit,
      .flip-card .bottom .digit,
      .flip-card .flip-top .digit,
      .flip-card .flip-bottom .digit {
        font-size: 50px;
        line-height: 64px;
      }

      .flip-card::before {
        box-shadow: 44px 0 0 #555;
      }

      .flip-separator {
        font-size: 32px;
        line-height: 64px;
      }

      .flip-card.small {
        width: 32px;
        height: 48px;
      }

      .flip-card.small .top .digit,
      .flip-card.small .bottom .digit,
      .flip-card.small .flip-top .digit,
      .flip-card.small .flip-bottom .digit {
        font-size: 38px;
        line-height: 48px;
      }

      .flip-card.small::before {
        box-shadow: 32px 0 0 #555;
      }

      .flip-separator-small {
        font-size: 24px;
        line-height: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-pane">
      <div class="pane-label">NTP Synced Clock</div>
      <div class="signal-indicator" id="signalIndicator"></div>

      <div class="clock-title">NTP 同期時計</div>
      <div class="toggle-group">
        <div class="sound-toggle">
          <label>
            <span>🔔 カウントダウン音</span>
            <input type="checkbox" id="soundToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="sound-toggle">
          <label>
            <span>🕰️ パタパタ時計</span>
            <input type="checkbox" id="flipClockToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="date-display" id="dateDisplay">----年--月--日 (---)</div>

      <div class="flip-clock-wrapper" id="flipClockWrapper">
        <div class="flip-clock-body">
          <div class="flip-ampm" id="flipAmPm">AM</div>
          <div class="flip-group">
            <div class="flip-card" id="flipH0">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
            <div class="flip-card" id="flipH1">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
          </div>
          <div class="flip-separator">.</div>
          <div class="flip-group">
            <div class="flip-card" id="flipM0">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
            <div class="flip-card" id="flipM1">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
          </div>
          <div class="flip-separator-small">.</div>
          <div class="flip-group">
            <div class="flip-card small" id="flipS0">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
            <div class="flip-card small" id="flipS1">
              <div class="top"><span class="digit">0</span></div>
              <div class="bottom"><span class="digit">0</span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="time-display" id="timeDisplay"><span id="timeH">--</span><span class="time-colon" id="colonHM">:</span><span id="timeM">--</span><span class="time-colon" id="colonMS">:</span><span id="timeS">--</span></div>
      <div class="ms-display" id="msDisplay">.---</div>

      <div class="countdown-label" id="countdownLabel"></div>
      <div class="countdown-bar">
        <div class="fill" id="countdownFill"></div>
      </div>

      <div class="sync-info">
        <div><span class="label">NTP サーバー:</span> <span class="value" id="syncServer">同期中...</span></div>
        <div><span class="label">オフセット:</span> <span class="value" id="offsetValue">---</span></div>
        <div><span class="label">最終同期:</span> <span class="value" id="lastSync">---</span></div>
      </div>

      <div class="time-compare">
        <div class="time-compare-title">時刻ソース比較</div>
        <table>
          <tr>
            <th>NTP 時刻</th>
            <td id="cmpNtp">--:--:--.---</td>
            <td class="diff" id="cmpNtpDiff"></td>
          </tr>
          <tr>
            <th>サーバー時刻</th>
            <td id="cmpServer">--:--:--.---</td>
            <td class="diff" id="cmpServerDiff"></td>
          </tr>
          <tr>
            <th>ブラウザ時刻</th>
            <td id="cmpBrowser">--:--:--.---</td>
            <td class="diff" id="cmpBrowserDiff"></td>
          </tr>
        </table>
      </div>
    </div>
    <div class="right-pane">
      <div class="pane-title">日本標準時 (JST)</div>
      <div class="pane-subtitle">NICT NTP 同期</div>
      <div class="analog-clock-container">
        <canvas id="analogClock" width="640" height="640"></canvas>
      </div>
      <div class="right-digital" id="rightDigital">--:--:--</div>
      <div class="right-ms" id="rightMs">.---</div>
      <div class="right-date" id="rightDate">----年--月--日</div>
      <div class="nict-link">
        参照: <a href="https://www.nict.go.jp/JST/JST5.html" target="_blank" rel="noopener">NICT 日本標準時</a>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let ntpOffset = 0;        // ms offset to add to Date.now()
    let serverLocalOffset = 0; // ms offset: serverLocalTime - browserTime
    let lastSyncServer = '';
    let lastSyncTimeStr = '';
    let audioCtx = null;
    let lastBeepSecond = -1;  // track which second we last beeped
    let countdownSoundEnabled = true;

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];

    function fmtTime(d) {
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      const ms = String(d.getMilliseconds()).padStart(3, '0');
      return `${hh}:${mm}:${ss}.${ms}`;
    }

    function fmtDiff(diffMs) {
      const sign = diffMs >= 0 ? '+' : '';
      return `${sign}${diffMs}ms`;
    }

    function updateTimeCompare(ntpNow) {
      const browserNow = new Date();
      const serverNow = new Date(Date.now() + serverLocalOffset);

      // NTP time (reference)
      document.getElementById('cmpNtp').textContent = fmtTime(ntpNow);
      document.getElementById('cmpNtpDiff').textContent = '(基準)';

      // Server local time
      const serverDiff = serverNow.getTime() - ntpNow.getTime();
      document.getElementById('cmpServer').textContent = fmtTime(serverNow);
      document.getElementById('cmpServerDiff').textContent = fmtDiff(serverDiff);

      // Browser local time
      const browserDiff = browserNow.getTime() - ntpNow.getTime();
      document.getElementById('cmpBrowser').textContent = fmtTime(browserNow);
      document.getElementById('cmpBrowserDiff').textContent = fmtDiff(browserDiff);
    }

    // --- Audio ---
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playTone(frequency, duration, volume = 0.3) {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(frequency, ctx.currentTime);
        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (e) {
        // Audio not available
      }
    }

    // --- NTP Sync ---
    async function syncTime() {
      try {
        const t0 = Date.now();
        const res = await fetch('/api/time');
        const t1 = Date.now();
        const data = await res.json();
        // Account for network round-trip: assume response represents midpoint
        const rtt = t1 - t0;
        const serverTimeAdjusted = data.serverTime + Math.round(rtt / 2);
        ntpOffset = serverTimeAdjusted - t1;

        // Server local clock offset (server raw time vs browser time)
        const serverLocalAdjusted = data.serverLocalTime + Math.round(rtt / 2);
        serverLocalOffset = serverLocalAdjusted - t1;

        lastSyncServer = data.syncServer || '---';
        if (data.lastSync) {
          const d = new Date(data.lastSync);
          lastSyncTimeStr = d.toLocaleTimeString('ja-JP');
        }

        document.getElementById('syncServer').textContent = lastSyncServer;
        document.getElementById('lastSync').textContent = lastSyncTimeStr;

        const offsetEl = document.getElementById('offsetValue');
        const offsetMs = data.offset;
        offsetEl.textContent = (offsetMs >= 0 ? '+' : '') + offsetMs + ' ms';
        offsetEl.className = 'value ' +
          (offsetMs > 0 ? 'offset-positive' : offsetMs < 0 ? 'offset-negative' : 'offset-zero');
      } catch (e) {
        // Will retry next interval
      }
    }

    // Sync every 30 seconds
    syncTime();
    setInterval(syncTime, 30000);

    // --- Clock Update ---
    function getNtpDate() {
      return new Date(Date.now() + ntpOffset);
    }

    function updateClock() {
      const now = getNtpDate();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ms = String(now.getMilliseconds()).padStart(3, '0');

      document.getElementById('timeH').textContent = hours;
      document.getElementById('timeM').textContent = minutes;
      document.getElementById('timeS').textContent = seconds;
      document.getElementById('msDisplay').textContent = `.${ms}`;

      // Blink colons every 0.5s (visible when ms < 500, hidden when ms >= 500)
      const colonHidden = now.getMilliseconds() >= 500;
      document.getElementById('colonHM').classList.toggle('hidden', colonHidden);
      document.getElementById('colonMS').classList.toggle('hidden', colonHidden);

      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const dow = DAYS[now.getDay()];
      document.getElementById('dateDisplay').textContent =
        `${year}年${month}月${day}日 (${dow})`;

      // --- Time Comparison ---
      updateTimeCompare(now);

      // --- Time Signal Logic ---
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const msNow = now.getMilliseconds();
      const indicator = document.getElementById('signalIndicator');
      const countdownFill = document.getElementById('countdownFill');
      const countdownLabel = document.getElementById('countdownLabel');

      // Countdown: last 5 seconds of each hour (min=59, sec=55..59)
      if (min === 59 && sec >= 55) {
        const remaining = 60 - sec - (msNow / 1000);
        const progress = ((5 - remaining) / 5) * 100;
        countdownFill.style.width = Math.min(100, Math.max(0, progress)) + '%';
        countdownLabel.textContent = `正時まで ${Math.ceil(remaining)} 秒`;

        // Beep at each second boundary (440 Hz)
        if (sec !== lastBeepSecond && msNow < 100) {
          if (countdownSoundEnabled) playTone(440, 0.1, 0.3);
          lastBeepSecond = sec;
          indicator.className = 'signal-indicator beep-low';
          setTimeout(() => { indicator.className = 'signal-indicator'; }, 200);
        }
      } else if (min === 0 && sec === 0) {
        // On the hour: 880 Hz
        countdownFill.style.width = '100%';
        countdownLabel.textContent = '正時';

        if (sec !== lastBeepSecond && msNow < 100) {
          if (countdownSoundEnabled) playTone(880, 0.5, 0.5);
          lastBeepSecond = sec;
          indicator.className = 'signal-indicator beep-high';
          setTimeout(() => { indicator.className = 'signal-indicator'; }, 600);
        }
      } else {
        countdownFill.style.width = '0%';
        countdownLabel.textContent = '';
        lastBeepSecond = -1;
      }

      // Update flip clock
      updateFlipClock(now);

      // Update right pane analog clock
      updateRightPane(now);

      requestAnimationFrame(updateClock);
    }

    // --- Analog Clock ---
    const analogCanvas = document.getElementById('analogClock');
    const actx = analogCanvas.getContext('2d');
    const CW = analogCanvas.width;
    const CH = analogCanvas.height;
    const CR = CW / 2;

    function drawAnalogClock(now) {
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      actx.clearRect(0, 0, CW, CH);
      actx.save();
      actx.translate(CR, CR);

      const radius = CR - 20;

      // --- Bezel (silver metallic ring) ---
      actx.beginPath();
      actx.arc(0, 0, radius + 12, 0, 2 * Math.PI);
      const bezelGrad = actx.createLinearGradient(-radius, -radius, radius, radius);
      bezelGrad.addColorStop(0, '#e8e8e8');
      bezelGrad.addColorStop(0.3, '#d0d0d0');
      bezelGrad.addColorStop(0.5, '#f0f0f0');
      bezelGrad.addColorStop(0.7, '#c8c8c8');
      bezelGrad.addColorStop(1, '#ddd');
      actx.fillStyle = bezelGrad;
      actx.fill();
      actx.lineWidth = 1;
      actx.strokeStyle = '#aaa';
      actx.stroke();

      // --- Face (white) ---
      actx.beginPath();
      actx.arc(0, 0, radius, 0, 2 * Math.PI);
      actx.fillStyle = '#fff';
      actx.fill();

      // --- Hour batons (thick rectangular marks, no numbers) ---
      for (let i = 0; i < 12; i++) {
        const angle = (i * Math.PI) / 6 - Math.PI / 2;
        actx.save();
        actx.rotate(angle + Math.PI / 2);
        // Baton: wide rectangle near the edge
        const batonW = 14;
        const batonH = radius * 0.15;
        const batonY = -(radius - 8);
        actx.fillStyle = '#1a1a1a';
        actx.fillRect(-batonW / 2, batonY, batonW, batonH);
        actx.restore();
      }

      // --- Minute ticks (thin marks between hours) ---
      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) continue; // skip hour positions
        const angle = (i * Math.PI) / 30 - Math.PI / 2;
        actx.save();
        actx.rotate(angle + Math.PI / 2);
        const tickW = 3;
        const tickH = radius * 0.05;
        const tickY = -(radius - 8);
        actx.fillStyle = '#1a1a1a';
        actx.fillRect(-tickW / 2, tickY, tickW, tickH);
        actx.restore();
      }

      // --- Hour hand (thick, blunt, rounded end) ---
      const hAngle = ((h % 12) + m / 60 + s / 3600) * (Math.PI / 6) - Math.PI / 2;
      actx.save();
      actx.rotate(hAngle + Math.PI / 2);
      actx.beginPath();
      const hw = 16; // width
      const hLen = radius * 0.52;
      const hTail = 20;
      // Rounded rectangle shape
      actx.moveTo(-hw / 2, hTail);
      actx.lineTo(-hw / 2, -hLen + hw / 2);
      actx.arcTo(-hw / 2, -hLen, 0, -hLen, hw / 2);
      actx.arcTo(hw / 2, -hLen, hw / 2, -hLen + hw / 2, hw / 2);
      actx.lineTo(hw / 2, hTail);
      actx.closePath();
      actx.fillStyle = '#1a1a1a';
      actx.fill();
      actx.restore();

      // --- Minute hand (thinner, longer, blunt) ---
      const mAngle = (m + s / 60) * (Math.PI / 30) - Math.PI / 2;
      actx.save();
      actx.rotate(mAngle + Math.PI / 2);
      actx.beginPath();
      const mw = 10;
      const mLen = radius * 0.78;
      const mTail = 24;
      actx.moveTo(-mw / 2, mTail);
      actx.lineTo(-mw / 2, -mLen + mw / 2);
      actx.arcTo(-mw / 2, -mLen, 0, -mLen, mw / 2);
      actx.arcTo(mw / 2, -mLen, mw / 2, -mLen + mw / 2, mw / 2);
      actx.lineTo(mw / 2, mTail);
      actx.closePath();
      actx.fillStyle = '#1a1a1a';
      actx.fill();
      actx.restore();

      // --- Second hand (red, with lollipop circle) ---
      const sFrac = s + ms / 1000;
      const sAngle = sFrac * (Math.PI / 30) - Math.PI / 2;
      actx.save();
      actx.rotate(sAngle + Math.PI / 2);
      const sLen = radius * 0.72;
      const sTail = radius * 0.18;
      const circleR = 14;
      const circleY = -(sLen - circleR - 4);

      // Tail
      actx.beginPath();
      actx.moveTo(0, sTail);
      actx.lineTo(0, circleY + circleR);
      actx.strokeStyle = '#d42020';
      actx.lineWidth = 3;
      actx.lineCap = 'round';
      actx.stroke();

      // Lollipop circle
      actx.beginPath();
      actx.arc(0, circleY, circleR, 0, 2 * Math.PI);
      actx.fillStyle = '#d42020';
      actx.fill();

      // Stem above circle to tip
      actx.beginPath();
      actx.moveTo(0, circleY - circleR);
      actx.lineTo(0, -(sLen + 8));
      actx.strokeStyle = '#d42020';
      actx.lineWidth = 3;
      actx.lineCap = 'round';
      actx.stroke();

      actx.restore();

      // --- Center cap (small circle covering hand pivots) ---
      actx.beginPath();
      actx.arc(0, 0, 7, 0, 2 * Math.PI);
      actx.fillStyle = '#1a1a1a';
      actx.fill();

      actx.restore();
    }

    function updateRightPane(now) {
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      document.getElementById('rightDigital').textContent = `${hours}:${minutes}:${seconds}`;
      document.getElementById('rightMs').textContent = `.${ms}`;

      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const dow = DAYS[now.getDay()];
      document.getElementById('rightDate').textContent = `${year}年${month}月${day}日 (${dow})`;

      drawAnalogClock(now);
    }

    // --- Sound toggle ---
    const soundToggleEl = document.getElementById('soundToggle');
    soundToggleEl.addEventListener('change', () => {
      countdownSoundEnabled = soundToggleEl.checked;
    });

    // --- Flip Clock ---
    let flipClockEnabled = false;
    const flipPrevDigits = { H0: '', H1: '', M0: '', M1: '', S0: '', S1: '' };
    const flipAnimating = { H0: false, H1: false, M0: false, M1: false, S0: false, S1: false };

    const flipToggleEl = document.getElementById('flipClockToggle');
    const flipWrapper = document.getElementById('flipClockWrapper');

    flipToggleEl.addEventListener('change', () => {
      flipClockEnabled = flipToggleEl.checked;
      flipWrapper.classList.toggle('active', flipClockEnabled);
      // Reset previous digits so all panels snap to current on enable
      if (flipClockEnabled) {
        flipPrevDigits.H0 = '';
        flipPrevDigits.H1 = '';
        flipPrevDigits.M0 = '';
        flipPrevDigits.M1 = '';
        flipPrevDigits.S0 = '';
        flipPrevDigits.S1 = '';
      }
    });

    function flipDigit(cardId, newDigit, key) {
      if (flipPrevDigits[key] === newDigit) return;
      if (flipAnimating[key]) return; // don't interrupt running animation
      const card = document.getElementById(cardId);
      const topDigit = card.querySelector(':scope > .top .digit');
      const bottomDigit = card.querySelector(':scope > .bottom .digit');
      const oldDigit = flipPrevDigits[key] || newDigit;

      if (flipPrevDigits[key] !== '' && flipPrevDigits[key] !== newDigit) {
        flipAnimating[key] = true;

        // Create flip animation elements
        const flipTop = document.createElement('div');
        flipTop.className = 'flip-top';
        flipTop.innerHTML = '<span class="digit">' + oldDigit + '</span>';

        const flipBottom = document.createElement('div');
        flipBottom.className = 'flip-bottom';
        flipBottom.innerHTML = '<span class="digit">' + newDigit + '</span>';

        card.appendChild(flipTop);
        card.appendChild(flipBottom);

        // Static top → new digit immediately (hidden behind flip-top, revealed when it falls)
        topDigit.textContent = newDigit;
        // Static bottom stays as old digit (visible until flip-bottom covers it)

        // Trigger animation
        void card.offsetWidth; // force reflow
        card.classList.add('flipping');

        // Cleanup after animation
        setTimeout(() => {
          bottomDigit.textContent = newDigit;
          card.classList.remove('flipping');
          flipTop.remove();
          flipBottom.remove();
          flipAnimating[key] = false;
        }, 650);
      } else {
        topDigit.textContent = newDigit;
        bottomDigit.textContent = newDigit;
      }

      flipPrevDigits[key] = newDigit;
    }

    function updateFlipClock(now) {
      if (!flipClockEnabled) return;

      let h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      // AM/PM
      const ampm = h < 12 ? 'AM' : 'PM';
      document.getElementById('flipAmPm').textContent = ampm;

      // Convert to 12-hour
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;

      const hStr = String(h).padStart(2, ' ');
      const mStr = String(m).padStart(2, '0');

      flipDigit('flipH0', hStr[0] === ' ' ? '\u2007' : hStr[0], 'H0');
      flipDigit('flipH1', hStr[1], 'H1');
      flipDigit('flipM0', mStr[0], 'M0');
      flipDigit('flipM1', mStr[1], 'M1');

      const sStr = String(s).padStart(2, '0');
      flipDigit('flipS0', sStr[0], 'S0');
      flipDigit('flipS1', sStr[1], 'S1');
    }

    // --- Init: require user interaction for AudioContext ---
    document.addEventListener('click', () => {
      getAudioContext();
    }, { once: true });

    requestAnimationFrame(updateClock);
  </script>
</body>
</html>
